<!DOCTYPE html>
    <html lang = "pt">
        <head>
            <link rel = "stylesheet" href = "style.css">

            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
            
            <title>
                Calculadora JS
            </title>
        </head>
        <body>
            <h1>Calculadora</h1>
            <div class = "fundo_calculadora">
                <div class = "visor" id = "visorNumero1">Digite sua operação! 💖</div>
                <div class = "calculadora">
                    <div class = "teclado_calculadora">
                        <div class = "teclado_numerico">
                            <button class = "botao_teclado botao_numero">1</button>
                            <button class = "botao_teclado botao_numero">2</button>
                            <button class = "botao_teclado botao_numero">3</button>
                            <button class = "botao_teclado botao_numero">4</button>
                            <button class = "botao_teclado botao_numero">5</button>
                            <button class = "botao_teclado botao_numero">6</button>
                            <button class = "botao_teclado botao_numero">7</button>
                            <button class = "botao_teclado botao_numero">8</button>
                            <button class = "botao_teclado botao_numero">9</button>
                            <button class = "botao_teclado botao_zero botao_numero">0</button>
                            <button class = "botao_teclado botao_numero">.</button>
                        </div>
                        <div class = "teclado_operacoes">
                            <button class = "botao_teclado botao_operacao">+</button>
                            <button class = "botao_teclado botao_operacao">-</button>
                            <button class = "botao_teclado botao_operacao">x</button>
                            <button class = "botao_teclado botao_operacao">÷</button>                    
                        </div>
                        <div class = "teclado_apagador">
                            <button class = "botao_teclado botao_apagador">←</button>
                            <button class = "botao_teclado botao_apagador">Clear</button>
                        </div>
                    </div>
                    <div class = "teclado_submit">
                        <button class = "botao_submit">Calcular!</button>
                        <div class = "imagem_canto"></div>
                    </div>
                </div>
            </div>
        </body>
        <script type='module' src = 'calculadora.js'></script>
    </html>
